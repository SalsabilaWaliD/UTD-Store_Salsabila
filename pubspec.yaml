name: utd_store_salsabila
description: UTD Store - Salsabila Wali Datussyuhada
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing & DI
  go_router: ^17.2.3
  get_it: ^9.2.1

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # WebSocket
  web_socket_channel: ^3.0.3

  # UI
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

dependency_overrides:
js: ^0.7.0
